<title>Caster — Cast Map</title>

<style>
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
  #map{position:absolute;inset:0}
  .ct{width:30px;height:30px;border-radius:50%;background:#d1603a;border:3px solid #fff;
      box-shadow:0 1px 4px rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;
      color:#fff;font-weight:800;font-size:16px}
  .ct.first{box-shadow:0 0 0 4px rgba(224,163,43,.9),0 1px 4px rgba(0,0,0,.6)}
  .ttl{position:absolute;top:14px;left:14px;z-index:1000;background:rgba(31,36,33,.92);color:#f6f1e7;
       padding:9px 14px;border-radius:9px;font-size:17px;font-weight:800;letter-spacing:.2px;max-width:58%}
  .ttl small{display:block;font-size:12px;font-weight:600;opacity:.85;letter-spacing:0;margin-top:2px}
  .ttl a{color:#e0b45a;text-decoration:none;font-size:12px;font-weight:700}
  .leg{position:absolute;right:14px;top:14px;z-index:1000;background:rgba(255,250,240,.97);
       border:1.5px solid #7a2f12;border-radius:11px;padding:11px 13px;font-size:13px;max-width:340px;box-shadow:0 2px 10px rgba(0,0,0,.4)}
  .leg h4{margin:0 0 8px;font-size:14px;color:#7a2f12;font-weight:800}
  .leg .r{display:flex;align-items:center;gap:9px;margin:5px 0;line-height:1.25}
  .leg .b{width:21px;height:21px;border-radius:50%;background:#d1603a;color:#fff;font-weight:800;font-size:12px;
          display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .leg .w{font-weight:700;color:#2b3a44}
  .leg .x{color:#5a5a4a}
  .leg .haz{margin-top:8px;font-size:11.5px;color:#a33;font-weight:700;line-height:1.3}
  .cred{position:absolute;bottom:6px;right:8px;z-index:1000;background:rgba(255,255,255,.75);
        padding:1px 6px;border-radius:4px;font-size:10px;color:#333}
  .cmp{position:absolute;bottom:14px;left:14px;z-index:1000}
  .cmp svg{filter:drop-shadow(0 1px 3px rgba(0,0,0,.5))}
  .leaflet-control-attribution{display:none}
</style>
</head>

L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',

document.getElementById('ttl').innerHTML = cfg.title + '<small>'+cfg.sub+' &nbsp;·&nbsp; <a href="index.html">🗺️ all spots</a></small>';
let leg = (cfg.unverified ? '<div class="haz" style="background:#9a6a2a;color:#fff;padding:5px 8px;border-radius:6px;margin:0 0 8px">⚠️ Not field-verified — targets checked against USGS NHD water geometry (2026-07-01) but not yet fished. Confirm structure on the water.</div>' : '') + '<h4>WHERE TO CAST</h4>';
function gm(ll){return `https://www.google.com/maps/search/?api=1&query=${ll[0]},${ll[1]}`;}
function gd(ll){return `https://www.google.com/maps/dir/?api=1&destination=${ll[0]},${ll[1]}`;}
cfg.targets.forEach(t=>{
  const ic = L.divIcon({className:'',html:`<div class="ct${t.n===1?' first':''}">${t.n}</div>`,iconSize:[30,30],iconAnchor:[15,15]});
  const pop = `<div style="font-size:13px;line-height:1.5;min-width:150px">
     <b>${t.n}. ${t.w}</b><br><span style="color:#5a5a4a">${t.x}</span>
     <div style="font-family:ui-monospace,monospace;font-size:11px;color:#666;margin:5px 0">${t.ll[0]}, ${t.ll[1]}</div>
     <a href="${gm(t.ll)}" target="_blank" rel="noopener" style="display:inline-block;background:#7a2f12;color:#fff;text-decoration:none;padding:5px 8px;border-radius:6px;font-size:12px;font-weight:700;margin:2px 3px 0 0">📍 Maps pin</a>
     <a href="${gd(t.ll)}" target="_blank" rel="noopener" style="display:inline-block;background:#2b6cb0;color:#fff;text-decoration:none;padding:5px 8px;border-radius:6px;font-size:12px;font-weight:700;margin-top:2px">🧭 Navigate</a>
   </div>`;
  L.marker(t.ll,{icon:ic}).addTo(map).bindPopup(pop,{maxWidth:230});
  leg += `<div class="r"><span class="b">${t.n}</span><span><span class="w">${t.w}</span> <span class="x">— ${t.x}</span></span></div>`;
});

document.getElementById('leg').innerHTML = leg;
document.querySelector('#map').insertAdjacentHTML('afterend','<div class="cred">Imagery © Esri, Maxar</div>');
