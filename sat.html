<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cast Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
  #map{position:absolute;inset:0}
  .ct{width:30px;height:30px;border-radius:50%;background:#d1603a;border:3px solid #fff;
      box-shadow:0 1px 4px rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;
      color:#fff;font-weight:800;font-size:16px}
  .ct.first{box-shadow:0 0 0 4px rgba(224,163,43,.9),0 1px 4px rgba(0,0,0,.6)}
  .ttl{position:absolute;top:14px;left:14px;z-index:1000;background:rgba(31,36,33,.92);color:#f6f1e7;
       padding:9px 14px;border-radius:9px;font-size:17px;font-weight:800;letter-spacing:.2px;max-width:58%}
  .ttl small{display:block;font-size:12px;font-weight:600;opacity:.85;letter-spacing:0;margin-top:2px}
  .ttl a{color:#e0b45a;text-decoration:none;font-size:12px;font-weight:700}
  .leg{position:absolute;right:14px;top:14px;z-index:1000;background:rgba(255,250,240,.97);
       border:1.5px solid #7a2f12;border-radius:11px;padding:11px 13px;font-size:13px;max-width:340px;box-shadow:0 2px 10px rgba(0,0,0,.4)}
  .leg h4{margin:0 0 8px;font-size:14px;color:#7a2f12;font-weight:800}
  .leg .r{display:flex;align-items:center;gap:9px;margin:5px 0;line-height:1.25}
  .leg .b{width:21px;height:21px;border-radius:50%;background:#d1603a;color:#fff;font-weight:800;font-size:12px;
          display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .leg .w{font-weight:700;color:#2b3a44}
  .leg .x{color:#5a5a4a}
  .leg .haz{margin-top:8px;font-size:11.5px;color:#a33;font-weight:700;line-height:1.3}
  .cred{position:absolute;bottom:6px;right:8px;z-index:1000;background:rgba(255,255,255,.75);
        padding:1px 6px;border-radius:4px;font-size:10px;color:#333}
  .cmp{position:absolute;bottom:14px;left:14px;z-index:1000}
  .cmp svg{filter:drop-shadow(0 1px 3px rgba(0,0,0,.5))}
  .leaflet-control-attribution{display:none}
</style>
</head>
<body>
<div id="map"></div>
<div class="ttl" id="ttl"></div>
<div class="leg" id="leg"></div>
<div class="cmp">
  <svg width="52" height="52" viewBox="0 0 52 52"><circle cx="26" cy="26" r="22" fill="rgba(255,250,240,.95)" stroke="#27424a" stroke-width="1.5"/>
   <polygon points="26,8 31,27 26,23 21,27" fill="#b5532a"/><polygon points="26,44 31,25 26,29 21,25" fill="#8a8468"/>
   <circle cx="26" cy="26" r="2.6" fill="#27424a"/><text x="26" y="7" font-size="11" text-anchor="middle" font-weight="800" fill="#27424a" font-family="Arial">N</text></svg>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const SPOTS = {
 'iron-bridge':{
   title:'Iron Bridge — Duck (Columbia)', sub:'Largemouth + catfish · abandoned Columbia Dam slackwater',
   center:[35.61168,-87.00222], zoom:17,
   targets:[
     {n:1,ll:[35.61277,-87.00195],w:'Bridge piling eddy',x:'tube / jig, sweep the pilings'},
     {n:2,ll:[35.61214,-87.00182],w:'Bluff edge (deep)',x:'Texas worm / craw tube'},
     {n:3,ll:[35.61139,-87.00242],w:'Slackwater flat',x:'wacky Senko / spinnerbait'},
     {n:4,ll:[35.61228,-87.00267],w:'Ramp eddy',x:'Ned / craw — smallmouth'},
     {n:5,ll:[35.61058,-87.00258],w:'Downstream pool',x:'Texas worm / cut bait'}
   ]
 },
 'eastern-flank':{
   title:'Eastern Flank — Harpeth (Franklin)', sub:'Smallmouth · the dam-removal cross-vane',
   center:[35.90905,-86.85540], zoom:18,
   targets:[
     {n:1,ll:[35.90910,-86.85505],w:'Seam over the vane',x:'tube, up-current'},
     {n:2,ll:[35.90884,-86.85453],w:'Plunge pool below',x:'craw tube / Ned'},
     {n:3,ll:[35.90930,-86.85560],w:'Left slack eddy',x:'Ned rig'},
     {n:4,ll:[35.90888,-86.85478],w:'Right slack eddy',x:'wacky Senko'},
     {n:5,ll:[35.90858,-86.85388],w:'Pool tailout',x:'jerkbait (low light)'}
   ]
 },
 'howard-bridge':{
   title:'Howard Bridge — Duck (Maury Co.)', sub:'Smallmouth + catfish · ramp, gravel bar, river bend',
   center:[35.57272,-86.92145], zoom:18,
   targets:[
     {n:1,ll:[35.57270,-86.92167],w:'Ramp-mouth eddy',x:'tube, sweep through'},
     {n:2,ll:[35.57254,-86.92205],w:'Ramp riprap',x:'Ned — smallmouth'},
     {n:3,ll:[35.57247,-86.92251],w:'Gravel-bar edge (downstream)',x:'craw crankbait'},
     {n:4,ll:[35.57299,-86.92040],w:'Riffle seam (upstream)',x:'tube up-current'},
     {n:5,ll:[35.57290,-86.92101],w:'Deep channel (mid-river)',x:'craw tube / cut bait'}
   ]
 },
 'henry-horton':{
   title:'Henry Horton — Duck (Wilhoite Trail)', sub:'Smallmouth + largemouth · river bend below the access',
   center:[35.59250,-86.69140], zoom:16,
   targets:[
     {n:1,ll:[35.59308,-86.68942],w:'Deep hole / outside bend',x:'Texas worm / cut bait'},
     {n:2,ll:[35.59454,-86.69213],w:'Rock seam in the run',x:'tube up-current'},
     {n:3,ll:[35.59429,-86.69444],w:'Slow shallow flat (upstream)',x:'topwater, low light'},
     {n:4,ll:[35.59170,-86.68898],w:'Bank laydowns',x:'jig / wacky Senko'},
     {n:5,ll:[35.59042,-86.68837],w:'Far shade line',x:'spotted bass — Ned'}
   ]
 },
 'chickasaw':{
   title:'Knob Creek confluence — Duck (Chickasaw Trace)', sub:'Smallmouth + largemouth · creek mouth + bend',
   center:[35.66232,-87.09347], zoom:18,
   targets:[
     {n:1,ll:[35.66260,-87.09377],w:'Creek mouth + seam',x:'topwater / Senko'},
     {n:2,ll:[35.66231,-87.09353],w:'Point + eddy',x:'wacky Senko / Ned'},
     {n:3,ll:[35.66194,-87.09321],w:'Shaded laydowns',x:'jig / Texas'},
     {n:4,ll:[35.66156,-87.09297],w:'Outside bend (deep)',x:'craw tube / Ned'},
     {n:5,ll:[35.66308,-87.09397],w:'Ramp riprap',x:'craw / Ned smallmouth'}
   ]
 },
 'williamsport':{
   title:'Williamsport Lakes — Blue Cat', sub:'Largemouth + crappie · grass, brush, riprap',
   center:[35.70370,-87.21630], zoom:16,
   targets:[
     {n:1,ll:[35.70584,-87.21732],w:'Grass mat (dawn)',x:'hollow-body frog'},
     {n:2,ll:[35.70411,-87.21567],w:'Shoreline brush',x:'Texas worm / swimbait'},
     {n:3,ll:[35.70670,-87.21483],w:'Creek inflow',x:'spinnerbait'},
     {n:4,ll:[35.70066,-87.21714],w:'Dam riprap',x:'crankbait — crayfish'},
     {n:5,ll:[35.70317,-87.21772],w:'Deep basin edge',x:'crappie jig / drop shot'}
   ]
 },
 'three-forks':{
   title:'Three Forks Bridge — Duck (Bedford)', sub:'Smallmouth + winter trout · top of the rocky float',
   center:[35.48030,-86.32390], zoom:17,
   targets:[
     {n:1,ll:[35.48087,-86.32242],w:'Big rocks / undercuts',x:'live crayfish / tube'},
     {n:2,ll:[35.47978,-86.32544],w:'First pool below riffle',x:'Ned rig'},
     {n:3,ll:[35.48018,-86.32349],w:'Current seam at ramp',x:'tube up-current'},
     {n:4,ll:[35.48025,-86.32399],w:'Gravel-bar edge',x:'craw crankbait'},
     {n:5,ll:[35.48066,-86.32282],w:'Eddy behind boulder',x:'Ned / small jerkbait'}
   ],
   haz:'⚠️ Parking closes at ≥400 cfs Normandy release — check the gage before driving.'
 },
 'normandy':{
   title:'Normandy Dam Tailwater — Duck (Coffee)', sub:'Stocked trout (Nov–Jun) + smallmouth · rocky shoal',
   center:[35.46400,-86.24640], zoom:17,
   targets:[
     {n:1,ll:[35.46493,-86.24655],w:'Flat rocky shoal',x:'Rooster Tail / Power Bait'},
     {n:2,ll:[35.46422,-86.24643],w:'Run below the shoal',x:'wooly bugger / nymph'},
     {n:3,ll:[35.46353,-86.24644],w:'Bank seam',x:'nightcrawler drift'},
     {n:4,ll:[35.46276,-86.24636],w:'Deep pool',x:'jerkbait — smallmouth'},
     {n:5,ll:[35.46465,-86.24631],w:'Eddy behind rock',x:'drift bait'}
   ],
   haz:'☠️ NEVER wade on a TVA generation release — water rises fast & cold. Check USGS gage 03596500.'
 }
};
const id = new URLSearchParams(location.search).get('id') || 'eastern-flank';
const cfg = SPOTS[id];
const map = L.map('map',{zoomControl:false,attributionControl:false}).setView(cfg.center,cfg.zoom);
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  {maxZoom:19}).addTo(map);
document.getElementById('ttl').innerHTML = cfg.title + '<small>'+cfg.sub+' &nbsp;·&nbsp; <a href="index.html">🗺️ all spots</a></small>';
let leg = '<h4>WHERE TO CAST</h4>';
function gm(ll){return `https://www.google.com/maps/search/?api=1&query=${ll[0]},${ll[1]}`;}
function gd(ll){return `https://www.google.com/maps/dir/?api=1&destination=${ll[0]},${ll[1]}`;}
cfg.targets.forEach(t=>{
  const ic = L.divIcon({className:'',html:`<div class="ct${t.n===1?' first':''}">${t.n}</div>`,iconSize:[30,30],iconAnchor:[15,15]});
  const pop = `<div style="font-size:13px;line-height:1.5;min-width:150px">
     <b>${t.n}. ${t.w}</b><br><span style="color:#5a5a4a">${t.x}</span>
     <div style="font-family:ui-monospace,monospace;font-size:11px;color:#666;margin:5px 0">${t.ll[0]}, ${t.ll[1]}</div>
     <a href="${gm(t.ll)}" target="_blank" rel="noopener" style="display:inline-block;background:#7a2f12;color:#fff;text-decoration:none;padding:5px 8px;border-radius:6px;font-size:12px;font-weight:700;margin:2px 3px 0 0">📍 Maps pin</a>
     <a href="${gd(t.ll)}" target="_blank" rel="noopener" style="display:inline-block;background:#2b6cb0;color:#fff;text-decoration:none;padding:5px 8px;border-radius:6px;font-size:12px;font-weight:700;margin-top:2px">🧭 Navigate</a>
   </div>`;
  L.marker(t.ll,{icon:ic}).addTo(map).bindPopup(pop,{maxWidth:230});
  leg += `<div class="r"><span class="b">${t.n}</span><span><span class="w">${t.w}</span> <span class="x">— ${t.x}</span></span></div>`;
});
if(cfg.haz) leg += `<div class="haz">${cfg.haz}</div>`;
document.getElementById('leg').innerHTML = leg;
document.querySelector('#map').insertAdjacentHTML('afterend','<div class="cred">Imagery © Esri, Maxar</div>');
</script>
</body>
</html>
